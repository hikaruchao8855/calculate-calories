<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兒童英文單字翻翻樂</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Microsoft JhengHei', sans-serif;
            background-color: #f0faff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { color: #ff6b6b; font-size: 2.5rem; text-shadow: 2px 2px #fff; margin-bottom: 10px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            max-width: 900px;
            width: 100%;
        }
        .card {
            background: white;
            border: 5px solid #4ecdc4;
            border-radius: 20px;
            padding: 25px 10px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 6px 0 #45b7af;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card:hover { transform: scale(1.05); background-color: #e6fffb; }
        .card:active { transform: translateY(4px); box-shadow: 0 2px 0 #45b7af; }
        .icon { font-size: 3rem; margin-bottom: 10px; }
        .eng { font-size: 1.8rem; font-weight: bold; color: #2d3436; margin-bottom: 5px; }
        
        /* 注音樣式 */
        ruby { font-size: 1.2rem; color: #636e72; font-weight: bold; }
        rt { font-size: 0.7rem; color: #ff6b6b; padding-bottom: 2px; }
    </style>
</head>
<body>

    <h1>🌟 英文單字大冒險 🌟</h1>
    <p style="margin-bottom: 20px;">點擊卡片聽聽看怎麼說吧！</p>

    <div class="grid" id="gameGrid"></div>

    <script>
        // 補齊後的 12 個單字與注音
        const words = [
            { eng: 'Hard', chi: '硬', bopo: 'ㄧㄥˋ', icon: '💎' },
            { eng: 'Soft', chi: '軟', bopo: 'ㄖㄨㄢˇ', icon: '🧸' },
            { eng: 'Heavy', chi: '重', bopo: 'ㄓㄨㄥˋ', icon: '🐘' },
            { eng: 'Light', chi: '輕', bopo: 'ㄑㄧㄥ', icon: '🪶' },
            { eng: 'Clean', chi: '乾淨', bopo: 'ㄍㄢ ㄐㄧㄥˋ', icon: '✨' },
            { eng: 'Dirty', chi: '髒', bopo: 'ㄗㄤ', icon: '💩' },
            { eng: 'New', chi: '新', bopo: 'ㄒㄧㄣ', icon: '🎁' },
            { eng: 'Old', chi: '舊', bopo: 'ㄐㄧㄡˋ', icon: '👴' },
            { eng: 'Round', chi: '圓', bopo: 'ㄩㄢˊ', icon: '🔵' },
            { eng: 'Square', chi: '方', bopo: 'ㄈㄤ', icon: '🟦' },
            { eng: 'Gold', chi: '金', bopo: 'ㄐㄧㄣ', icon: '🥇' },
            { eng: 'Silver', chi: '銀', bopo: 'ㄧㄣˊ', icon: '🥈' }
        ];

        const grid = document.getElementById('gameGrid');

        words.forEach(word => {
            const card = document.createElement('div');
            card.className = 'card';
            
            // 處理多個中文字與注音的對應
            const chars = word.chi.split('');
            const bopos = word.bopo.split(' ');
            let rubyHTML = '';
            chars.forEach((c, i) => {
                rubyHTML += `<ruby>${c}<rt>${bopos[i] || ''}</rt></ruby>`;
            });

            card.innerHTML = `
                <span class="icon">${word.icon}</span>
                <span class="eng">${word.eng}</span>
                <div>${rubyHTML}</div>
            `;
            
            card.onclick = () => {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(word.eng);
                utterance.lang = 'en-US';
                utterance.rate = 0.75; 
                window.speechSynthesis.speak(utterance);
            };
            grid.appendChild(card);
        });
    </script>
</body>
</html>
