<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>單字100 · 快樂學英文</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root{
    --pink:#ff7eb9; --yellow:#ffd93d; --green:#6bcB77; --blue:#4d96ff;
    --purple:#b892ff; --orange:#ff9f45; --cream:#fff8e7;
  }
  body{
    font-family:"Comic Sans MS","Segoe UI Rounded","PingFang TC","Microsoft JhengHei",sans-serif;
    background:linear-gradient(160deg,#a0e9ff 0%,#fff6b7 55%,#ffd3e0 100%);
    min-height:100vh; color:#3a3a5a; overflow-x:hidden;
  }
  .wrap{max-width:900px;margin:0 auto;padding:16px;}
  h1{
    text-align:center;font-size:2.4rem;color:#fff;margin:10px 0 4px;
    text-shadow:3px 3px 0 var(--pink),6px 6px 0 rgba(0,0,0,.08);
    letter-spacing:2px;
  }
  .subtitle{text-align:center;color:#6b5b95;font-size:1rem;margin-bottom:14px;}
  /* score bar */
  .topbar{
    display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;
  }
  .badge{
    background:#fff;border-radius:30px;padding:8px 18px;font-weight:bold;font-size:1.1rem;
    box-shadow:0 4px 0 rgba(0,0,0,.1);display:flex;align-items:center;gap:6px;
  }
  /* menu */
  .menu{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:10px;}
  .mode-btn{
    border:none;border-radius:24px;padding:26px 14px;font-size:1.3rem;font-weight:bold;
    color:#fff;cursor:pointer;box-shadow:0 6px 0 rgba(0,0,0,.15);transition:transform .1s;
    display:flex;flex-direction:column;align-items:center;gap:8px;font-family:inherit;
  }
  .mode-btn .emoji{font-size:2.6rem;}
  .mode-btn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.15);}
  .m1{background:linear-gradient(135deg,#ff7eb9,#ff65a3);}
  .m2{background:linear-gradient(135deg,#4d96ff,#3a7bd5);}
  .m3{background:linear-gradient(135deg,#6bcB77,#4caf50);}
  .m4{background:linear-gradient(135deg,#ff9f45,#ff7a00);}
  /* screens */
  .screen{display:none;}
  .screen.active{display:block;animation:pop .3s ease;}
  @keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
  .backbtn{
    background:#fff;border:none;border-radius:20px;padding:8px 16px;font-size:1rem;font-weight:bold;
    cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.1);margin-bottom:12px;font-family:inherit;color:#6b5b95;
  }
  .panel{
    background:rgba(255,255,255,.85);border-radius:28px;padding:22px 18px;
    box-shadow:0 8px 24px rgba(0,0,0,.12);
  }
  .qcount{text-align:center;color:#8a7fb5;font-size:.95rem;margin-bottom:6px;}
  /* quiz */
  .prompt{
    text-align:center;font-size:3rem;font-weight:bold;color:#4d96ff;margin:10px 0 6px;
    word-break:break-word;
  }
  .prompt.zh{color:#ff65a3;}
  .prompt small{display:block;font-size:1rem;color:#aaa;margin-top:4px;}
  .speaker{
    background:var(--yellow);border:none;border-radius:50%;width:70px;height:70px;font-size:2rem;
    cursor:pointer;box-shadow:0 5px 0 #e6b800;margin:6px auto;display:block;
  }
  .speaker:active{transform:translateY(3px);box-shadow:0 2px 0 #e6b800;}
  .options{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:18px;}
  .opt{
    border:none;border-radius:20px;padding:20px 10px;font-size:1.4rem;font-weight:bold;cursor:pointer;
    background:#fff;color:#3a3a5a;box-shadow:0 5px 0 rgba(0,0,0,.1);transition:transform .08s;font-family:inherit;
  }
  .opt:active{transform:translateY(3px);}
  .opt.correct{background:var(--green);color:#fff;animation:shake-ok .4s;}
  .opt.wrong{background:#ff6b6b;color:#fff;animation:shake-no .4s;}
  @keyframes shake-ok{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  @keyframes shake-no{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  /* spell */
  .letters,.slots{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:14px 0;}
  .slot{
    width:44px;height:54px;border-radius:12px;background:#fff;border:3px dashed #bbb;
    display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:bold;color:#4d96ff;
  }
  .slot.filled{border-style:solid;border-color:var(--green);}
  .tile{
    width:46px;height:54px;border-radius:12px;background:var(--purple);color:#fff;border:none;
    font-size:1.6rem;font-weight:bold;cursor:pointer;box-shadow:0 4px 0 #8a5cff;font-family:inherit;
  }
  .tile:active{transform:translateY(2px);}
  .tile.used{visibility:hidden;}
  .hintword{text-align:center;color:#8a7fb5;margin-top:8px;font-size:1.1rem;}
  /* memory */
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px;}
  .card{
    aspect-ratio:3/4;border-radius:16px;cursor:pointer;position:relative;
    perspective:600px;
  }
  .card .inner{position:absolute;inset:0;transition:transform .4s;transform-style:preserve-3d;}
  .card.flip .inner{transform:rotateY(180deg);}
  .face{position:absolute;inset:0;border-radius:16px;display:flex;align-items:center;justify-content:center;
    backface-visibility:hidden;font-weight:bold;text-align:center;padding:4px;box-shadow:0 4px 0 rgba(0,0,0,.1);}
  .front{background:linear-gradient(135deg,#b892ff,#8a5cff);color:#fff;font-size:2rem;}
  .back{background:#fff;transform:rotateY(180deg);font-size:1.05rem;color:#3a3a5a;}
  .back.en{color:#4d96ff;font-size:1.15rem;}
  .card.matched .inner{transform:rotateY(180deg);}
  .card.matched .back{background:#d7ffd9;}
  /* feedback */
  .feedback{
    position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    font-size:5rem;pointer-events:none;z-index:50;
  }
  .feedback.show{display:flex;animation:fb .8s ease;}
  @keyframes fb{0%{transform:scale(.2);opacity:0}30%{transform:scale(1.2);opacity:1}70%{transform:scale(1);opacity:1}100%{opacity:0}}
  /* confetti */
  .confetti{position:fixed;top:-20px;width:12px;height:12px;z-index:40;pointer-events:none;}
  /* win */
  .winbox{text-align:center;padding:30px 10px;}
  .winbox .big{font-size:4rem;}
  .winbox h2{font-size:1.8rem;color:#ff65a3;margin:8px 0;}
  .stars{font-size:2.4rem;margin:8px 0;}
  .again{
    background:var(--green);color:#fff;border:none;border-radius:24px;padding:16px 30px;font-size:1.3rem;
    font-weight:bold;cursor:pointer;box-shadow:0 5px 0 #3d9140;margin-top:12px;font-family:inherit;
  }
  .again:active{transform:translateY(3px);}
  @media(max-width:520px){
    h1{font-size:1.9rem;}
    .prompt{font-size:2.3rem;}
    .grid{grid-template-columns:repeat(3,1fr);}
    .opt{font-size:1.2rem;}
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>🐻 單字100 🐊</h1>
  <div class="subtitle">跟著小熊和鱷魚一起快樂學英文！</div>
  <div class="topbar">
    <div class="badge">⭐ <span id="score">0</span> 分</div>
    <div class="badge">🔥 連對 <span id="streak">0</span></div>
  </div>

  <!-- MENU -->
  <div id="menu" class="screen active">
    <div class="menu">
      <button class="mode-btn m1" onclick="startMode('memory')"><span class="emoji">🃏</span>配對翻牌</button>
      <button class="mode-btn m2" onclick="startMode('spell')"><span class="emoji">🔊</span>聽發音拼單字</button>
      <button class="mode-btn m3" onclick="startMode('zh2en')"><span class="emoji">🇹🇼</span>看中文選英文</button>
      <button class="mode-btn m4" onclick="startMode('en2zh')"><span class="emoji">🔤</span>看英文選中文</button>
    </div>
  </div>

  <!-- QUIZ (zh2en / en2zh) -->
  <div id="quiz" class="screen">
    <button class="backbtn" onclick="goMenu()">⬅ 回主選單</button>
    <div class="panel">
      <div class="qcount">第 <span id="qnow">1</span> / <span id="qtotal">10</span> 題</div>
      <div id="quizPrompt" class="prompt">word</div>
      <button id="quizSpeak" class="speaker" onclick="speakCurrent()" style="display:none">🔊</button>
      <div id="quizOptions" class="options"></div>
    </div>
  </div>

  <!-- SPELL -->
  <div id="spell" class="screen">
    <button class="backbtn" onclick="goMenu()">⬅ 回主選單</button>
    <div class="panel">
      <div class="qcount">第 <span id="snow">1</span> / <span id="stotal">10</span> 題</div>
      <button class="speaker" onclick="speakCurrent()">🔊</button>
      <div class="hintword">中文：<b id="spellZh"></b></div>
      <div id="spellSlots" class="slots"></div>
      <div id="spellTiles" class="letters"></div>
    </div>
  </div>

  <!-- MEMORY -->
  <div id="memory" class="screen">
    <button class="backbtn" onclick="goMenu()">⬅ 回主選單</button>
    <div class="panel">
      <div class="qcount">把英文和中文配成一對！ 已配對 <span id="matchN">0</span> / <span id="matchT">6</span></div>
      <div id="memGrid" class="grid"></div>
    </div>
  </div>

  <!-- WIN -->
  <div id="win" class="screen">
    <div class="panel winbox">
      <div class="big">🎉🏆🎉</div>
      <h2 id="winMsg">太棒了！</h2>
      <div class="stars" id="winStars">⭐⭐⭐</div>
      <p id="winDetail" style="color:#8a7fb5;font-size:1.1rem"></p>
      <button class="again" onclick="goMenu()">再玩一次 🎮</button>
    </div>
  </div>
</div>

<div id="feedback" class="feedback"></div>

<script>
/* ---------- 100 words ---------- */
const WORDS = [
 ["afternoon","下午","🌤️"],["animal","動物","🐾"],["ant","螞蟻","🐜"],["arm","手臂","💪"],["ax","斧頭","🪓"],
 ["bathroom","浴室","🛁"],["bedroom","臥房","🛏️"],["bike","腳踏車","🚲"],["bird","小鳥","🐦"],["blue","藍色","🔵"],
 ["body","身體","🧍"],["book","書籍","📖"],["boy","男生","👦"],["car","汽車","🚗"],["cat","貓","🐱"],
 ["chair","椅子","🪑"],["child","小孩","🧒"],["circle","圓圈","⭕"],["climb","爬","🧗"],["color","顏色","🎨"],
 ["cook","煮","🍳"],["cow","母牛","🐄"],["crayon","蠟筆","🖍️"],["daughter","女兒","👧"],["desk","桌子","🪑"],
 ["dog","狗","🐶"],["duck","鴨子","🦆"],["ear","耳朵","👂"],["eat","吃","😋"],["egg","蛋","🥚"],
 ["eight","八","8️⃣"],["eraser","橡皮擦","🧽"],["evening","傍晚","🌆"],["eye","眼睛","👁️"],["face","臉","😊"],
 ["family","家庭","👨‍👩‍👧"],["father","父親","👨"],["finger","手指","👆"],["fish","魚","🐟"],["five","五","5️⃣"],
 ["flower","花","🌸"],["four","四","4️⃣"],["girl","女生","👧"],["green","綠色","🟢"],["hair","頭髮","💇"],
 ["hand","手","✋"],["hat","帽子","🎩"],["head","頭","🗣️"],["heart","心","❤️"],["horse","馬","🐴"],
 ["house","房子","🏠"],["ink","墨水","🖊️"],["jam","果醬","🍓"],["jump","跳","🤸"],["kitchen","廚房","🍽️"],
 ["kite","風箏","🪁"],["knee","膝蓋","🦵"],["leg","小腿","🦵"],["lion","獅子","🦁"],["marker","白板筆","🖊️"],
 ["monkey","猴子","🐵"],["morning","早上","🌅"],["mother","母親","👩"],["mouth","嘴巴","👄"],["neck","脖子","🧣"],
 ["net","網子","🥅"],["night","晚上","🌙"],["nine","九","9️⃣"],["nose","鼻子","👃"],["one","一","1️⃣"],
 ["ox","公牛","🐂"],["pen","筆","🖊️"],["pencil","鉛筆","✏️"],["pig","豬","🐷"],["play","玩","🎮"],
 ["queen","女王","👸"],["rat","鼠","🐀"],["read","閱讀","📚"],["red","紅色","🔴"],["ruler","尺","📏"],
 ["school","學校","🏫"],["seven","七","7️⃣"],["shape","形狀","🔷"],["six","六","6️⃣"],["star","星星","⭐"],
 ["student","學生","🎓"],["sun","太陽","☀️"],["swing","鞦韆","🛝"],["ten","十","🔟"],["tent","帳篷","⛺"],
 ["three","三","3️⃣"],["toe","腳趾","🦶"],["tree","樹木","🌳"],["two","二","2️⃣"],["umbrella","雨傘","☔"],
 ["van","廂型車","🚐"],["watch","手錶","⌚"],["yellow","黃色","🟡"],["yo-yo","溜溜球","🪀"],["zebra","斑馬","🦓"]
];

/* ---------- state ---------- */
let score=0, streak=0;
const $=id=>document.getElementById(id);
function updateBar(){$("score").textContent=score;$("streak").textContent=streak;}

/* sound via WebAudio for effects */
let actx;
function beep(freq,dur,type="sine"){
  try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();
    o.type=type;o.frequency.value=freq;o.connect(g);g.connect(actx.destination);
    g.gain.setValueAtTime(.2,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+dur);
    o.start();o.stop(actx.currentTime+dur);}catch(e){}
}
function goodSound(){beep(660,.12);setTimeout(()=>beep(880,.16),110);}
function badSound(){beep(200,.25,"square");}

/* speech */
let enVoice=null;
function pickVoice(){
  const vs=speechSynthesis.getVoices();
  enVoice=vs.find(v=>/en-US/i.test(v.lang)&&/female|samantha|zira|google/i.test(v.name))
        ||vs.find(v=>/^en/i.test(v.lang))||null;
}
if('speechSynthesis'in window){speechSynthesis.onvoiceschanged=pickVoice;pickVoice();}
function say(text){
  if(!('speechSynthesis'in window))return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text.replace('-',' '));
  u.lang='en-US';u.rate=.8;if(enVoice)u.voice=enVoice;
  speechSynthesis.speak(u);
}
let currentWord=null;
function speakCurrent(){if(currentWord)say(currentWord[0]);}

/* feedback + confetti */
function showFeedback(emoji){
  const f=$("feedback");f.textContent=emoji;f.classList.remove("show");
  void f.offsetWidth;f.classList.add("show");
}
function confetti(){
  const colors=["#ff7eb9","#ffd93d","#6bcB77","#4d96ff","#b892ff","#ff9f45"];
  for(let i=0;i<28;i++){
    const c=document.createElement("div");c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=colors[i%colors.length];
    c.style.borderRadius=Math.random()>.5?"50%":"2px";
    document.body.appendChild(c);
    const dx=(Math.random()-.5)*200,dur=1200+Math.random()*900;
    c.animate([{transform:'translate(0,0) rotate(0)',opacity:1},
      {transform:`translate(${dx}px,110vh) rotate(${Math.random()*720}deg)`,opacity:.9}],
      {duration:dur,easing:'ease-in'});
    setTimeout(()=>c.remove(),dur);
  }
}

/* helpers */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function sample(n,exclude){const pool=shuffle(WORDS.filter(w=>w!==exclude));return pool.slice(0,n);}

function showScreen(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));$(id).classList.add("active");}
function goMenu(){speechSynthesis&&speechSynthesis.cancel();showScreen("menu");}

/* ---------- modes ---------- */
const QN=10;
function startMode(m){
  if(m==='memory')startMemory();
  else if(m==='spell')startSpell();
  else startQuiz(m);
}

/* QUIZ: zh2en & en2zh */
let quizList,quizIdx,quizMode;
function startQuiz(mode){
  quizMode=mode;quizList=shuffle(WORDS).slice(0,QN);quizIdx=0;
  $("qtotal").textContent=QN;showScreen("quiz");renderQuiz();
}
function renderQuiz(){
  const w=quizList[quizIdx];currentWord=w;
  $("qnow").textContent=quizIdx+1;
  const pEl=$("quizPrompt"),spk=$("quizSpeak");
  if(quizMode==='zh2en'){
    pEl.className="prompt zh";pEl.innerHTML=w[2]+"<br>"+w[1]+"<small>選出正確的英文</small>";
    spk.style.display="none";
  }else{
    pEl.className="prompt";pEl.innerHTML=w[2]+" "+w[0]+"<small>它是什麼意思？</small>";
    spk.style.display="block";say(w[0]);
  }
  const wrong=sample(3,w);
  const opts=shuffle([w,...wrong]);
  const box=$("quizOptions");box.innerHTML="";
  opts.forEach(o=>{
    const b=document.createElement("button");b.className="opt";
    b.textContent=quizMode==='zh2en'?o[0]:o[1];
    b.onclick=()=>answerQuiz(b,o===w,w);
    box.appendChild(b);
  });
}
function answerQuiz(btn,correct,w){
  [...$("quizOptions").children].forEach(b=>b.disabled=true);
  if(correct){
    btn.classList.add("correct");score+=10;streak++;updateBar();
    goodSound();showFeedback(["🎉","👍","🌟","😄","💯"][Math.random()*5|0]);
    if(quizMode==='zh2en')say(w[0]);
    setTimeout(nextQuiz,900);
  }else{
    btn.classList.add("wrong");streak=0;updateBar();badSound();showFeedback("🤔");
    [...$("quizOptions").children].forEach(b=>{
      if(b.textContent===(quizMode==='zh2en'?w[0]:w[1]))b.classList.add("correct");
    });
    setTimeout(nextQuiz,1500);
  }
}
function nextQuiz(){
  quizIdx++;
  if(quizIdx>=quizList.length)finishGame(quizMode);
  else renderQuiz();
}

/* SPELL */
let spellList,spellIdx,spellTarget,spellFilled;
function startSpell(){
  // 用短單字比較適合拼字（<=6字母）
  const easy=WORDS.filter(w=>w[0].replace('-','').length<=6);
  spellList=shuffle(easy).slice(0,QN);spellIdx=0;
  $("stotal").textContent=QN;showScreen("spell");renderSpell();
}
function renderSpell(){
  const w=spellList[spellIdx];currentWord=w;spellTarget=w[0].replace('-','');
  $("snow").textContent=spellIdx+1;$("spellZh").textContent=w[2]+" "+w[1];
  spellFilled=[];
  const slots=$("spellSlots");slots.innerHTML="";
  for(let i=0;i<spellTarget.length;i++){
    const s=document.createElement("div");s.className="slot";s.dataset.i=i;slots.appendChild(s);
  }
  const tiles=$("spellTiles");tiles.innerHTML="";
  shuffle(spellTarget.split("")).forEach((ch,idx)=>{
    const t=document.createElement("button");t.className="tile";t.textContent=ch;t.dataset.k=idx;
    t.onclick=()=>placeTile(t,ch);
    tiles.appendChild(t);
  });
  say(w[0]);
}
function placeTile(tile,ch){
  const pos=spellFilled.length;
  if(pos>=spellTarget.length)return;
  const slot=$("spellSlots").children[pos];
  slot.textContent=ch;slot.classList.add("filled");
  spellFilled.push({ch,tile});tile.classList.add("used");
  if(spellFilled.length===spellTarget.length)checkSpell();
}
function checkSpell(){
  const guess=spellFilled.map(x=>x.ch).join("");
  if(guess===spellTarget){
    score+=15;streak++;updateBar();goodSound();confetti();
    showFeedback("🌟");say(currentWord[0]);
    setTimeout(()=>{spellIdx++;spellIdx>=spellList.length?finishGame('spell'):renderSpell();},1100);
  }else{
    streak=0;updateBar();badSound();showFeedback("😯");
    // reset after brief wrong flash
    [...$("spellSlots").children].forEach(s=>s.style.borderColor="#ff6b6b");
    setTimeout(renderSpell,900);
  }
}

/* MEMORY */
let memFirst,memLock,memMatched,memTotal;
function startMemory(){
  const picks=shuffle(WORDS).slice(0,6);memTotal=6;memMatched=0;memFirst=null;memLock=false;
  $("matchT").textContent=6;$("matchN").textContent=0;
  let cards=[];
  picks.forEach(w=>{
    cards.push({id:w[0],type:"en",label:w[2]+" "+w[0],word:w});
    cards.push({id:w[0],type:"zh",label:w[1],word:w});
  });
  cards=shuffle(cards);
  const grid=$("memGrid");grid.innerHTML="";
  cards.forEach(c=>{
    const el=document.createElement("div");el.className="card";
    el.innerHTML=`<div class="inner">
      <div class="face front">?</div>
      <div class="face back ${c.type==='en'?'en':''}">${c.label}</div></div>`;
    el.onclick=()=>flipCard(el,c);
    grid.appendChild(el);
  });
  showScreen("memory");
}
function flipCard(el,c){
  if(memLock||el.classList.contains("flip")||el.classList.contains("matched"))return;
  el.classList.add("flip");
  if(c.type==="en")say(c.word[0]);
  if(!memFirst){memFirst={el,c};return;}
  memLock=true;
  if(memFirst.c.id===c.id){
    goodSound();
    setTimeout(()=>{
      memFirst.el.classList.add("matched");el.classList.add("matched");
      memMatched++;$("matchN").textContent=memMatched;score+=10;updateBar();
      showFeedback("💖");memFirst=null;memLock=false;
      if(memMatched===memTotal){confetti();setTimeout(()=>finishGame('memory'),700);}
    },500);
  }else{
    badSound();
    setTimeout(()=>{
      memFirst.el.classList.remove("flip");el.classList.remove("flip");
      memFirst=null;memLock=false;
    },900);
  }
}

/* WIN */
function finishGame(mode){
  confetti();confetti();
  const names={zh2en:"看中文選英文",en2zh:"看英文選中文",spell:"聽發音拼單字",memory:"配對翻牌"};
  $("winMsg").textContent=["太棒了！","你好厲害！","答對很多耶！","小英文高手！"][Math.random()*4|0];
  $("winStars").textContent = streak>=6?"⭐⭐⭐" : streak>=3?"⭐⭐":"⭐";
  $("winDetail").textContent=`完成【${names[mode]}】　目前總分 ${score} 分！`;
  showScreen("win");
  beep(660,.12);setTimeout(()=>beep(880,.12),120);setTimeout(()=>beep(1046,.2),240);
}
</script>
