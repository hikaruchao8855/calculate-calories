<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文單字背誦遊戲</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #667eea;
            font-size: 1.8em;
            margin-bottom: 10px;
        }
        .mode-switch {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            justify-content: center;
        }
        .mode-btn {
            padding: 10px 20px;
            border: 2px solid #667eea;
            border-radius: 20px;
            background: white;
            color: #667eea;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .mode-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            color: #888;
            font-size: 0.9em;
        }
        .card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-bottom: 20px;
        }
        .meaning-display {
            font-size: 2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .meaning-display:hover {
            color: #667eea;
        }
        .speaker-icon {
            font-size: 0.5em;
            opacity: 0.5;
        }
        .meaning-display:hover .speaker-icon {
            opacity: 1;
        }
        .hint {
            font-size: 1.1em;
            color: #666;
        }
        .options {
            display: grid;
            gap: 10px;
        }
        .option {
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 1.1em;
            transition: all 0.3s ease;
        }
        .option:hover {
            border-color: #667eea;
            background: #f0f0ff;
        }
        .option.correct {
            border-color: #4caf50;
            background: #e8f5e9;
            color: #2e7d32;
        }
        .option.wrong {
            border-color: #f44336;
            background: #ffebee;
            color: #c62828;
        }
        .option:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        .fill-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.2em;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
        }
        .fill-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        .fill-input.correct {
            border-color: #4caf50;
            background: #e8f5e9;
        }
        .fill-input.wrong {
            border-color: #f44336;
            background: #ffebee;
        }
        .answer-feedback {
            margin-top: 15px;
            font-size: 1.2em;
            font-weight: bold;
        }
        .answer-feedback.correct {
            color: #4caf50;
        }
        .answer-feedback.wrong {
            color: #f44336;
        }
        .answer-feedback .correct-answer {
            color: #4caf50;
        }
        .result-icon {
            font-size: 4em;
            margin-bottom: 10px;
        }
        .result-text {
            font-size: 1.2em;
            color: #666;
        }
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .game-over {
            text-align: center;
        }
        .final-score {
            font-size: 4em;
            font-weight: bold;
            color: #667eea;
        }
        .restart-btn {
            margin-top: 20px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>英文單字背誦遊戲</h1>
            <div class="mode-switch">
                <button class="mode-btn active" id="choiceModeBtn" onclick="switchMode('choice')">選擇題</button>
                <button class="mode-btn" id="fillModeBtn" onclick="switchMode('fill')">填字題</button>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="correctCount">0</div>
                <div class="stat-label">答對</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="wrongCount">0</div>
                <div class="stat-label">答錯</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="remainCount">68</div>
                <div class="stat-label">剩餘</div>
            </div>
        </div>
        <div class="card" id="gameCard">
            <div class="meaning-display" id="meaningDisplay" onclick="speakWord()">
                女人
                <span class="speaker-icon">🔊</span>
            </div>
            <div class="hint" id="hintDisplay">點擊可以聽發音</div>
        </div>
        <div class="options" id="optionsContainer"></div>
        <div id="fillContainer" class="hidden">
            <input type="text" class="fill-input" id="fillInput" placeholder="輸入英文單字" autocomplete="off">
            <button class="btn btn-primary" id="submitBtn" onclick="checkFillAnswer()">送出答案</button>
            <div class="answer-feedback" id="answerFeedback"></div>
        </div>
        <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>下一題</button>
    </div>

    <script>
        const words = [
            { word: "female", meaning: "女人" },
            { word: "region", meaning: "地區" },
            { word: "forbid", meaning: "禁止" },
            { word: "continue", meaning: "繼續" },
            { word: "education", meaning: "教育" },
            { word: "principal", meaning: "校長" },
            { word: "equal", meaning: "相等的" },
            { word: "control", meaning: "控制" },
            { word: "annoy", meaning: "惱怒" },
            { word: "threaten", meaning: "威脅" },
            { word: "surgery", meaning: "外科手術" },
            { word: "recover", meaning: "康復" },
            { word: "sign", meaning: "簽名" },
            { word: "persuade", meaning: "說服" },
            { word: "adopt", meaning: "採納" },
            { word: "policy", meaning: "政策" },
            { word: "ensure", meaning: "保證" },
            { word: "establish", meaning: "建立" },
            { word: "honor", meaning: "榮耀" },
            { word: "weapon", meaning: "手段" },
            { word: "dare", meaning: "敢" },
            { word: "entertain", meaning: "娛樂" },
            { word: "imagination", meaning: "有想像力的" },
            { word: "consistently", meaning: "持續的" },
            { word: "convey", meaning: "傳達" },
            { word: "parade", meaning: "遊行" },
            { word: "request", meaning: "請求" },
            { word: "extreme", meaning: "極端的" },
            { word: "achieve", meaning: "達成" },
            { word: "passion", meaning: "熱情" },
            { word: "hardship", meaning: "艱難" },
            { word: "poverty", meaning: "貧窮" },
            { word: "rescue", meaning: "解救" },
            { word: "career", meaning: "事業" },
            { word: "weave", meaning: "編織" },
            { word: "deliver", meaning: "傳達" },
            { word: "disadvantage", meaning: "劣勢" },
            { word: "overcome", meaning: "克服" },
            { word: "attitude", meaning: "態度" },
            { word: "challenge", meaning: "挑戰" },
            { word: "obstacle", meaning: "障礙" },
            { word: "fulfill", meaning: "實現" },
            { word: "bang", meaning: "砰的一聲" },
            { word: "quote", meaning: "引用" },
            { word: "raw", meaning: "生的" },
            { word: "freeze", meaning: "結冰" },
            { word: "mental", meaning: "心智的" },
            { word: "victim", meaning: "受害者" },
            { word: "republic", meaning: "共和國" },
            { word: "opposite", meaning: "在對面" },
            { word: "superior", meaning: "較優的" },
            { word: "emergency", meaning: "緊急事件" },
            { word: "creative", meaning: "有創造力的" },
            { word: "media", meaning: "媒體" },
            { word: "plenty", meaning: "充分" },
            { word: "wagon", meaning: "運貨馬車" },
            { word: "scholar", meaning: "學者" },
            { word: "risk", meaning: "風險" },
            { word: "loose", meaning: "寬鬆的" },
            { word: "cone", meaning: "圓錐體" },
            { word: "odd", meaning: "奇怪的" },
            { word: "breath", meaning: "呼吸" },
            { word: "release", meaning: "釋放" },
            { word: "temper", meaning: "脾氣" },
            { word: "cotton", meaning: "棉" },
            { word: "lily", meaning: "百合" },
            { word: "straw", meaning: "吸管" },
            { word: "flour", meaning: "麵粉" },
            { word: "tunnel", meaning: "隧道" },
            { word: "quit", meaning: "離開" },
            { word: "intelligent", meaning: "聰明的" },
            { word: "exhibition", meaning: "展覽會" }
        ];

        let currentIndex = 0;
        let correctCount = 0;
        let wrongCount = 0;
        let shuffledWords = [];
        let options = [];
        let currentMode = 'choice';

        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function getRandomOptions(correctMeaning, allMeanings) {
            const wrongOptions = allMeanings.filter(m => m !== correctMeaning);
            const shuffledWrong = shuffle(wrongOptions).slice(0, 3);
            return shuffle([correctMeaning, ...shuffledWrong]);
        }

        function switchMode(mode) {
            currentMode = mode;
            const choiceBtn = document.getElementById('choiceModeBtn');
            const fillBtn = document.getElementById('fillModeBtn');
            const optionsContainer = document.getElementById('optionsContainer');
            const fillContainer = document.getElementById('fillContainer');

            if (mode === 'choice') {
                choiceBtn.classList.add('active');
                fillBtn.classList.remove('active');
                optionsContainer.classList.remove('hidden');
                fillContainer.classList.add('hidden');
            } else {
                choiceBtn.classList.remove('active');
                fillBtn.classList.add('active');
                optionsContainer.classList.add('hidden');
                fillContainer.classList.remove('hidden');
            }
            initGame();
        }

        function initGame() {
            shuffledWords = shuffle(words);
            currentIndex = 0;
            correctCount = 0;
            wrongCount = 0;
            updateStats();
            showQuestion();
        }

        function speakWord() {
            const word = shuffledWords[currentIndex].word;
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            speechSynthesis.speak(utterance);
        }

        function showQuestion() {
            const current = shuffledWords[currentIndex];
            
            document.getElementById('hintDisplay').textContent = '這個英文單字的意思是什麼？';
            document.getElementById('nextBtn').disabled = true;
            document.getElementById('answerFeedback').textContent = '';
            document.getElementById('answerFeedback').className = 'answer-feedback';

            if (currentMode === 'choice') {
                document.getElementById('meaningDisplay').innerHTML = `${current.word}<span class="speaker-icon">🔊</span>`;
                document.getElementById('meaningDisplay').onclick = speakWord;
                const allMeanings = words.map(w => w.meaning);
                options = getRandomOptions(current.meaning, allMeanings);
                
                const container = document.getElementById('optionsContainer');
                container.innerHTML = '';
                container.classList.remove('hidden');

                options.forEach(option => {
                    const btn = document.createElement('button');
                    btn.className = 'option';
                    btn.textContent = option;
                    btn.onclick = () => checkChoiceAnswer(btn, option, current.meaning);
                    container.appendChild(btn);
                });
            } else {
                document.getElementById('meaningDisplay').innerHTML = `${current.meaning}<span class="speaker-icon">🔊</span>`;
                document.getElementById('meaningDisplay').onclick = speakWord;
                document.getElementById('hintDisplay').textContent = '請輸入英文單字';
                
                const fillInput = document.getElementById('fillInput');
                fillInput.value = '';
                fillInput.className = 'fill-input';
                fillInput.disabled = false;
                fillInput.placeholder = '輸入英文單字';
                fillInput.onkeypress = (e) => {
                    if (e.key === 'Enter') {
                        checkFillAnswer();
                    }
                };
                fillInput.focus();
            }

            speakWord();
        }

        function checkChoiceAnswer(btn, selected, correct) {
            const allBtns = document.querySelectorAll('.option');
            allBtns.forEach(b => b.disabled = true);

            if (selected === correct) {
                btn.classList.add('correct');
                correctCount++;
            } else {
                btn.classList.add('wrong');
                wrongCount++;
                allBtns.forEach(b => {
                    if (b.textContent === correct) b.classList.add('correct');
                });
            }

            updateStats();
            document.getElementById('nextBtn').disabled = false;
        }

        function checkFillAnswer() {
            const fillInput = document.getElementById('fillInput');
            const feedback = document.getElementById('answerFeedback');
            const userAnswer = fillInput.value.trim().toLowerCase();
            const correct = shuffledWords[currentIndex].word.toLowerCase();

            fillInput.disabled = true;

            if (userAnswer === correct) {
                fillInput.classList.add('correct');
                feedback.innerHTML = `✓ 正確！<span class="correct-answer">${shuffledWords[currentIndex].word}</span>`;
                feedback.className = 'answer-feedback correct';
                correctCount++;
            } else {
                fillInput.classList.add('wrong');
                feedback.innerHTML = `✗ 正確答案是：<span class="correct-answer">${shuffledWords[currentIndex].word}</span>`;
                feedback.className = 'answer-feedback wrong';
                wrongCount++;
            }

            updateStats();
            document.getElementById('nextBtn').disabled = false;
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex >= shuffledWords.length) {
                showGameOver();
            } else {
                showQuestion();
            }
        }

        function showGameOver() {
            const card = document.getElementById('gameCard');
            card.innerHTML = `
                <div class="game-over">
                    <div class="result-icon">🎉</div>
                    <div class="final-score">${correctCount}/${shuffledWords.length}</div>
                    <div class="result-text">
                        ${correctCount === shuffledWords.length ? '太棒了！全部答對！' : 
                          correctCount >= shuffledWords.length * 0.8 ? '做得很好！' :
                          correctCount >= shuffledWords.length * 0.5 ? '還不錯，繼續加油！' : '多加練習會更好！'}
                    </div>
                </div>
            `;
            document.getElementById('optionsContainer').innerHTML = '';
            document.getElementById('fillContainer').classList.add('hidden');
            const nextBtn = document.getElementById('nextBtn');
            nextBtn.textContent = '重新開始';
            nextBtn.onclick = () => {
                card.innerHTML = `
                    <div class="meaning-display" id="meaningDisplay" onclick="speakWord()">
                        ${currentMode === 'choice' ? 'female' : '女人'}
                        <span class="speaker-icon">🔊</span>
                    </div>
                    <div class="hint" id="hintDisplay">點擊可以聽發音</div>
                `;
                nextBtn.textContent = '下一題';
                nextBtn.onclick = nextQuestion;
                if (currentMode === 'fill') {
                    document.getElementById('fillContainer').classList.remove('hidden');
                } else {
                    document.getElementById('optionsContainer').classList.remove('hidden');
                }
                initGame();
            };
        }

        function updateStats() {
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('wrongCount').textContent = wrongCount;
            document.getElementById('remainCount').textContent = shuffledWords.length - currentIndex;
            const progress = (currentIndex / shuffledWords.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        initGame();
    </script>
</body>
</html>
